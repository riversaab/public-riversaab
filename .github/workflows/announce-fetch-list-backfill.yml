name: 公告列表回填 (L0-list)

on:
  workflow_dispatch:
    inputs:
      date_source:
        description: "日期范围: YYYYMMDD~YYYYMMDD"
        required: true
        type: string
      max_parallel:
        description: "每轮并发 runner 数，默认 1，最大 20"
        required: false
        default: "1"
        type: string
      round_index:
        description: "当前轮次索引（0-based）"
        required: false
        default: "0"
        type: string
      high_only:
        description: "是否只保留高优先级候选"
        required: false
        default: "false"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: announce-fetch-list-backfill-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      INPUT_DATE_SOURCE: ${{ github.event.inputs.date_source }}
      INPUT_ROUND_INDEX: ${{ github.event.inputs.round_index || '0' }}
      INPUT_MAX_PARALLEL: ${{ github.event.inputs.max_parallel || '1' }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    outputs:
      dates_matrix: ${{ steps.resolve.outputs.dates_matrix }}
      has_work: ${{ steps.resolve.outputs.has_work }}
      has_next_round: ${{ steps.resolve.outputs.has_next_round }}
      total_rounds: ${{ steps.resolve.outputs.total_rounds }}
      current_round: ${{ steps.resolve.outputs.current_round }}
      max_parallel: ${{ steps.input.outputs.max_parallel }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Resolve effective inputs
        id: input
        run: |
          echo "max_parallel=${INPUT_MAX_PARALLEL}" >> "$GITHUB_OUTPUT"

      - name: Resolve backfill dates
        id: resolve
        run: |
          python -m my_stock announce resolve-backfill-dates \
            --date-source "${INPUT_DATE_SOURCE}" \
            --round-index "${INPUT_ROUND_INDEX}" \
            --max-parallel "${INPUT_MAX_PARALLEL}" \
            --github-output "$GITHUB_OUTPUT"

  fetch-list-batch:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_work == 'true'
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.dates_matrix) }}
      fail-fast: false
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      INPUT_HIGH_ONLY: ${{ github.event.inputs.high_only || 'false' }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Compute date range
        id: dates
        env:
          DATE_STR: ${{ matrix.date }}
        shell: bash
        run: |
          set -euo pipefail
          # DATE_STR is YYYYMMDD — convert to YYYY-MM-DD
          start="${DATE_STR:0:4}-${DATE_STR:4:2}-${DATE_STR:6:2}"
          end="${start}"
          echo "start=${start}" >> "$GITHUB_OUTPUT"
          echo "end=${end}" >> "$GITHUB_OUTPUT"

      - name: Sync year repos for this date
        run: |
          python -m my_stock announce sync-year-repos \
            --start "${{ steps.dates.outputs.start }}" \
            --end "${{ steps.dates.outputs.end }}"

      - name: Fetch list (daily)
        run: |
          ARTIFACT_ROOT="${RUNNER_TEMP}/announce-artifact/list"
          mkdir -p "${ARTIFACT_ROOT}"
          python -m my_stock announce fetch-list \
            --start "${{ steps.dates.outputs.start }}" \
            --end "${{ steps.dates.outputs.end }}" \
            --append --monthly \
            --output-root "${ARTIFACT_ROOT}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/list-summary.json"

      - name: Filter candidates
        run: |
          ARTIFACT_ROOT="${RUNNER_TEMP}/announce-artifact"
          python -m my_stock announce filter-candidates \
            --start "${{ steps.dates.outputs.start }}" \
            --end "${{ steps.dates.outputs.end }}" \
            --list-root "${ARTIFACT_ROOT}/list" \
            --output-root "${ARTIFACT_ROOT}/candidates" \
            --high-only-text "${INPUT_HIGH_ONLY}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/candidates-summary.json" \
          || python -m my_stock announce filter-candidates-workflow \
            --start "${{ steps.dates.outputs.start }}" \
            --end "${{ steps.dates.outputs.end }}" \
            --list-root "${ARTIFACT_ROOT}/list" \
            --output-root "${ARTIFACT_ROOT}/candidates" \
            --high-only-text "${INPUT_HIGH_ONLY}" \
            --no-push \
            --summary-output "${RUNNER_TEMP}/candidates-summary.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: announce-l0-list-${{ matrix.date }}
          path: ${{ runner.temp }}/announce-artifact
          if-no-files-found: warn
          retention-days: 7

  collect-round:
    runs-on: ubuntu-latest
    needs: [prepare, fetch-list-batch]
    if: needs.prepare.outputs.has_work == 'true'
    env:
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Download all date artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: announce-l0-list-*
          path: ${{ runner.temp }}/announce-artifacts
          merge-multiple: true

      - name: Collect this round to action-private
        run: |
          mkdir -p "${RUNNER_TEMP}/announce-artifacts"
          python -m my_stock announce collect-round \
            --artifact-dir "${RUNNER_TEMP}/announce-artifacts" \
            --stage "l0-list" \
            --push-to-action-private

  next-round:
    runs-on: ubuntu-latest
    needs: [prepare, fetch-list-batch, collect-round]
    if: |
      always() &&
      needs.prepare.outputs.has_next_round == 'true' &&
      (needs.collect-round.result == 'success' || needs.collect-round.result == 'skipped')
    env:
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Dispatch next round
        env:
          EXTRA_HIGH_ONLY: ${{ github.event.inputs.high_only || 'false' }}
        run: |
          python -m my_stock announce trigger-next-round \
            --date-source "${{ github.event.inputs.date_source }}" \
            --max-parallel "${{ needs.prepare.outputs.max_parallel }}" \
            --current-round "${{ needs.prepare.outputs.current_round }}" \
            --total-rounds "${{ needs.prepare.outputs.total_rounds }}" \
            --workflow-file "announce-fetch-list-backfill.yml" \
            --extra-inputs "{\"high_only\":\"${EXTRA_HIGH_ONLY}\"}"
