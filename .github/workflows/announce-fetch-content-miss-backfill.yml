name: 公告正文补漏 (L0-content miss)

# 与 announce-fetch-content-backfill.yml 几乎一致，区别在 prepare 阶段：
# - 始终强制 date_source=action-private（仅处理本 owner 分配到的日期）
# - 把 owner/action-private 整个 clone 下来，传给 resolve-backfill-batches --action-private-dir
# - resolve 时按 art_code 过滤掉 results/announce/l0-content/{YYYY}/{YYYYMM}/{YYYYMMDD}.parquet 已有记录
# - 只对“缺漏”的 art_code 重新分片下载，结果走相同的 collect-round 流程合并并 push 回 action-private

on:
  workflow_dispatch:
    inputs:
      max_parallel:
        description: "每轮并发 runner 数（默认 20）"
        required: false
        default: "20"
        type: string
      round_index:
        description: "当前轮次索引（0-based），每轮处理一个日期"
        required: false
        default: "0"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: announce-fetch-content-miss-backfill-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      INPUT_DATE_SOURCE: action-private
      INPUT_ROUND_INDEX: ${{ github.event.inputs.round_index || '0' }}
      INPUT_MAX_PARALLEL: ${{ github.event.inputs.max_parallel || '20' }}
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    outputs:
      batches_matrix: ${{ steps.resolve.outputs.batches_matrix }}
      has_work: ${{ steps.resolve.outputs.has_work }}
      has_next_round: ${{ steps.resolve.outputs.has_next_round }}
      total_rounds: ${{ steps.resolve.outputs.total_rounds }}
      current_round: ${{ steps.resolve.outputs.current_round }}
      current_date: ${{ steps.resolve.outputs.current_date }}
      batch_count: ${{ steps.resolve.outputs.batch_count }}
      batch_tmp_dir: ${{ steps.resolve.outputs.batch_tmp_dir }}
      max_parallel: ${{ steps.input.outputs.max_parallel }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Clone owner action-private (full)
        env:
          ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
        run: |
          AP_DIR="${RUNNER_TEMP}/action-private"
          rm -rf "$AP_DIR"
          python3 - <<'PY'
          import json, os, subprocess
          owner = os.environ['GITHUB_REPOSITORY_OWNER']
          raw = os.environ.get('ACTION_DISPATCH_TOKEN_MAP', '')
          token = ''
          for line in raw.strip().splitlines():
              e = json.loads(line.strip())
              if e.get('owner') == owner:
                  token = e['token']
                  break
          if not token:
              raise SystemExit(f'no token for owner {owner}')
          dest = os.environ['RUNNER_TEMP'] + '/action-private'
          subprocess.run(
              ['git', 'clone', '--depth', '1',
               f'https://x-access-token:{token}@github.com/{owner}/action-private.git', dest],
              check=True,
          )
          PY
          echo "ACTION_PRIVATE_DIR=${AP_DIR}" >> "$GITHUB_ENV"

      - name: Sync year raw repos for assigned date range
        env:
          ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
        run: |
          RANGE=$(python3 -c "
          import json, pathlib, os
          p = pathlib.Path(os.environ['ACTION_PRIVATE_DIR']) / 'data' / 'job-matrix-announce-dates.json'
          dates = json.loads(p.read_text()) if p.exists() else []
          if dates:
              mn, mx = min(dates), max(dates)
              print(f'{mn[:4]}-{mn[4:6]}-{mn[6:8]}~{mx[:4]}-{mx[4:6]}-{mx[6:8]}')
          else:
              print('2026-01-01~2026-12-31')
          ")
          START=$(echo "$RANGE" | cut -d~ -f1)
          END=$(echo "$RANGE" | cut -d~ -f2)
          python -m my_stock announce sync-year-repos --start "$START" --end "$END"

      - name: Resolve effective inputs
        id: input
        run: |
          echo "max_parallel=${INPUT_MAX_PARALLEL}" >> "$GITHUB_OUTPUT"

      - name: Resolve miss batches
        id: resolve
        env:
          ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
        run: |
          python -m my_stock announce resolve-backfill-batches \
            --date-source "${INPUT_DATE_SOURCE}" \
            --repos-root "${GP_REPOS_ROOT}" \
            --matrix-file "job-matrix-announce-dates.json" \
            --batch-size 50 \
            --round-index "${INPUT_ROUND_INDEX}" \
            --action-private-dir "${ACTION_PRIVATE_DIR}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload batch splits
        if: steps.resolve.outputs.has_work == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: batch-splits
          path: ${{ steps.resolve.outputs.batch_tmp_dir }}
          retention-days: 1

  fetch-content-batch:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_work == 'true'
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.batches_matrix) }}
      max-parallel: 20
      fail-fast: false
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      CURRENT_DATE: ${{ needs.prepare.outputs.current_date }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Download batch splits
        uses: actions/download-artifact@v5
        with:
          name: batch-splits
          path: ${{ runner.temp }}/batch-splits

      - name: Fetch content for batch
        env:
          BATCH_IDX: ${{ matrix.batch_idx }}
        run: |
          STAGGER=$(( BATCH_IDX * 3 ))
          if [ "$STAGGER" -gt 0 ]; then
            echo "[stagger] sleeping ${STAGGER}s before fetch (batch_idx=${BATCH_IDX})"
            sleep "$STAGGER"
          fi
          BATCH_FILE=$(printf "${RUNNER_TEMP}/batch-splits/batch_%04d.json" "${BATCH_IDX}")
          ARTIFACT_ROOT="${RUNNER_TEMP}/announce-content-artifact"
          mkdir -p "${ARTIFACT_ROOT}"
          python -m my_stock announce fetch-content-worker \
            --codes-file "${BATCH_FILE}" \
            --runner-idx "${BATCH_IDX}" \
            --output-dir "${ARTIFACT_ROOT}" \
            --summary-output "${RUNNER_TEMP}/content-summary.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: announce-l0-content-${{ needs.prepare.outputs.current_date }}-${{ matrix.batch_idx }}
          path: ${{ runner.temp }}/announce-content-artifact
          if-no-files-found: warn
          retention-days: 7

  collect-round:
    runs-on: ubuntu-latest
    needs: [prepare, fetch-content-batch]
    if: needs.prepare.outputs.has_work == 'true'
    env:
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Download all batch artifacts
        id: dl1
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          pattern: announce-l0-content-*
          path: ${{ runner.temp }}/announce-artifacts
          merge-multiple: true

      - name: Wait before retry 1
        if: steps.dl1.outcome == 'failure'
        run: sleep 30

      - name: Download all batch artifacts (retry 1)
        if: steps.dl1.outcome == 'failure'
        id: dl2
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          pattern: announce-l0-content-*
          path: ${{ runner.temp }}/announce-artifacts
          merge-multiple: true

      - name: Wait before retry 2
        if: steps.dl1.outcome == 'failure' && steps.dl2.outcome == 'failure'
        run: sleep 60

      - name: Download all batch artifacts (retry 2)
        if: steps.dl1.outcome == 'failure' && steps.dl2.outcome == 'failure'
        uses: actions/download-artifact@v5
        with:
          pattern: announce-l0-content-*
          path: ${{ runner.temp }}/announce-artifacts
          merge-multiple: true

      - name: Collect this round to action-private (merge into existing l0-content)
        run: |
          mkdir -p "${RUNNER_TEMP}/announce-artifacts"
          python -m my_stock announce collect-round \
            --artifact-dir "${RUNNER_TEMP}/announce-artifacts" \
            --stage "l0-content" \
            --push-to-action-private

  next-round:
    runs-on: ubuntu-latest
    needs: [prepare, fetch-content-batch, collect-round]
    if: |
      always() &&
      needs.prepare.outputs.has_next_round == 'true' &&
      (needs.collect-round.result == 'success' || needs.collect-round.result == 'skipped')
    env:
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Trigger next round
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m my_stock announce trigger-next-round \
            --date-source "action-private" \
            --max-parallel "${{ needs.prepare.outputs.max_parallel }}" \
            --current-round "${{ needs.prepare.outputs.current_round }}" \
            --total-rounds "${{ needs.prepare.outputs.total_rounds }}" \
            --workflow-file "announce-fetch-content-miss-backfill.yml"
