name: 龙虎榜历史派生特征 (L2H)

on:
  workflow_dispatch:
    inputs:
      date_source:
        description: "日期来源: YYYYMMDD~YYYYMMDD / action-private（留空=当天）"
        required: false
        default: ""
        type: string
      max_parallel:
        description: "每轮并发 runner 数，默认 1，最大 20"
        required: false
        default: "1"
        type: string
      round_index:
        description: "当前轮次索引（0-based）"
        required: false
        default: "0"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: lhb-derive-history-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      INPUT_DATE_SOURCE: ${{ github.event.inputs.date_source || '' }}
      INPUT_ROUND_INDEX: ${{ github.event.inputs.round_index || '0' }}
      INPUT_MAX_PARALLEL: ${{ github.event.inputs.max_parallel || '1' }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    outputs:
      dates_matrix: ${{ steps.resolve.outputs.dates_matrix }}
      has_work: ${{ steps.resolve.outputs.has_work }}
      has_next_round: ${{ steps.resolve.outputs.has_next_round }}
      total_rounds: ${{ steps.resolve.outputs.total_rounds }}
      current_round: ${{ steps.resolve.outputs.current_round }}
      effective_date_source: ${{ steps.input.outputs.effective_date_source }}
      max_parallel: ${{ steps.input.outputs.max_parallel }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Resolve effective inputs
        id: input
        shell: bash
        run: |
          set -euo pipefail
          effective_source="${INPUT_DATE_SOURCE}"
          if [ -z "${effective_source}" ]; then
            today_cst=$(TZ=Asia/Shanghai date +%Y%m%d)
            effective_source="${today_cst}"
          fi
          echo "effective_date_source=${effective_source}" >> "$GITHUB_OUTPUT"
          echo "max_parallel=${INPUT_MAX_PARALLEL}" >> "$GITHUB_OUTPUT"

      - name: Resolve backfill date ranges
        id: resolve
        run: |
          python -m my_stock lhb resolve-backfill-dates \
            --date-source "${{ steps.input.outputs.effective_date_source }}" \
            --round-index "${INPUT_ROUND_INDEX}" \
            --max-parallel "${INPUT_MAX_PARALLEL}" \
            --trade-dates-file "${GITHUB_WORKSPACE}/my-stock-src/data/basic/trade_date.json" \
            --matrix-file "job-matrix-lhb.json" \
            --chunk-mode "range" \
            --lookback-days 60 \
            --github-output "$GITHUB_OUTPUT"

  derive-batch:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_work == 'true'
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.dates_matrix) }}
      fail-fast: false
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      GP_LHB_REPO: gp-lhb
      GP_LHB_DERIVED_REPO: gp-lhb-derived
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Sync gp-lhb data repo
        run: python -m my_stock common sync-repo gp-lhb

      - name: Derive history features
        env:
          CHUNK_START: ${{ matrix.start }}
          CHUNK_END: ${{ matrix.end }}
          LOOKBACK_START: ${{ matrix.lookback_start }}
        run: |
          python -m my_stock lhb derive-history-features \
            --start "${CHUNK_START}" \
            --end "${CHUNK_END}" \
            --lookback-start "${LOOKBACK_START}" \
            --input-root "${GP_REPOS_ROOT}/gp-lhb/data/lhb/stock_daily" \
            --output-root "${RUNNER_TEMP}/lhb-l2h-output" \
            --summary-output "${RUNNER_TEMP}/lhb-l2h-summary.json"

      - name: Publish directly (daily mode)
        if: needs.prepare.outputs.effective_date_source != 'action-private'
        run: |
          python -m my_stock common sync-repo gp-lhb-derived
          python -m my_stock lhb publish-stock-daily \
            --summary-path "${RUNNER_TEMP}/lhb-l2h-summary.json" \
            --target-repo gp-lhb-derived \
            --repo-subdir history-derived \
            --start "${{ matrix.start }}" \
            --end "${{ matrix.end }}"

      - name: Stage artifact (backfill mode)
        if: needs.prepare.outputs.effective_date_source == 'action-private'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, shutil
          from pathlib import Path

          summary = Path(os.environ["RUNNER_TEMP"]) / "lhb-l2h-summary.json"
          artifact_root = Path(os.environ["RUNNER_TEMP"]) / "lhb-artifact"
          artifact_root.mkdir(parents=True, exist_ok=True)

          payload = json.loads(summary.read_text(encoding="utf-8"))
          copied = 0
          for raw in payload.get("written_files", []):
              src = Path(raw)
              if src.suffix != ".parquet":
                  continue
              year = src.parent.name
              dest = artifact_root / "history_derived" / year / src.name
              dest.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(src, dest)
              copied += 1
          print(f"staged_history_derived={copied}")
          PY

      - name: Upload artifact
        if: needs.prepare.outputs.effective_date_source == 'action-private'
        uses: actions/upload-artifact@v4
        with:
          name: lhb-l2h-${{ matrix.start }}-${{ matrix.end }}
          path: ${{ runner.temp }}/lhb-artifact
          if-no-files-found: warn
          retention-days: 7

  collect-round:
    runs-on: ubuntu-latest
    needs: [prepare, derive-batch]
    if: needs.prepare.outputs.has_work == 'true' && needs.prepare.outputs.effective_date_source == 'action-private'
    env:
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      GP_DATA_GITHUB_OWNER: larkself
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Download all chunk artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: lhb-l2h-*
          path: ${{ runner.temp }}/lhb-artifacts
          merge-multiple: true

      - name: Push history_derived to action-private
        shell: bash
        run: |
          set -euo pipefail
          python -m my_stock lhb collect-l2-round \
            --artifact-dir "${RUNNER_TEMP}/lhb-artifacts" \
            --subdir "history_derived" \
            --date-source "action-private"

  next-round:
    runs-on: ubuntu-latest
    needs: [prepare, derive-batch, collect-round]
    if: |
      always() &&
      needs.prepare.outputs.has_next_round == 'true' &&
      (needs.collect-round.result == 'success' || needs.collect-round.result == 'skipped')
    env:
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install ./my-stock-src && break || sleep 5; done

      - name: Dispatch next round
        run: |
          python -m my_stock lhb trigger-next-round \
            --date-source "${{ needs.prepare.outputs.effective_date_source }}" \
            --max-parallel "${{ needs.prepare.outputs.max_parallel }}" \
            --current-round "${{ needs.prepare.outputs.current_round }}" \
            --total-rounds "${{ needs.prepare.outputs.total_rounds }}" \
            --workflow-file "lhb-derive-history-features.yml"
