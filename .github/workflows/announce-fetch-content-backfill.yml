name: 公告正文回填 (L0-content)

on:
  workflow_dispatch:
    inputs:
      year:
        description: "目标年份 (如 2019)，用于定位年仓中的 content_batches"
        required: true
        type: string
      max_parallel:
        description: "每轮并发 runner 数，默认 20，最大 20（受单 IP 限流约束，每 runner 处理 50 条）"
        required: false
        default: "20"
        type: string
      round_index:
        description: "当前轮次索引（0-based）"
        required: false
        default: "0"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: announce-fetch-content-backfill-${{ github.repository }}-${{ github.event.inputs.year }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      INPUT_YEAR: ${{ github.event.inputs.year }}
      INPUT_ROUND_INDEX: ${{ github.event.inputs.round_index || '0' }}
      INPUT_MAX_PARALLEL: ${{ github.event.inputs.max_parallel || '5' }}
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
    outputs:
      batches_matrix: ${{ steps.resolve.outputs.batches_matrix }}
      has_work: ${{ steps.resolve.outputs.has_work }}
      has_next_round: ${{ steps.resolve.outputs.has_next_round }}
      total_rounds: ${{ steps.resolve.outputs.total_rounds }}
      current_round: ${{ steps.resolve.outputs.current_round }}
      max_parallel: ${{ steps.input.outputs.max_parallel }}
      batch_dir: ${{ steps.paths.outputs.batch_dir }}
      content_dir: ${{ steps.paths.outputs.content_dir }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Sync year raw repo
        run: |
          python -m my_stock announce sync-year-repos \
            --start "${INPUT_YEAR}-01-01" \
            --end "${INPUT_YEAR}-12-31"

      - name: Resolve paths
        id: paths
        run: |
          REPO_DIR="${GP_REPOS_ROOT}/gp-announce-raw-${INPUT_YEAR}"
          echo "batch_dir=${REPO_DIR}/data/announce/content_batches" >> "$GITHUB_OUTPUT"
          echo "content_dir=${REPO_DIR}/raw/content" >> "$GITHUB_OUTPUT"

      - name: Resolve effective inputs
        id: input
        run: |
          echo "max_parallel=${INPUT_MAX_PARALLEL}" >> "$GITHUB_OUTPUT"

      - name: Resolve backfill batches
        id: resolve
        run: |
          python -m my_stock announce resolve-backfill-batches \
            --batch-dir "${{ steps.paths.outputs.batch_dir }}" \
            --content-dir "${{ steps.paths.outputs.content_dir }}" \
            --round-index "${INPUT_ROUND_INDEX}" \
            --max-parallel "${INPUT_MAX_PARALLEL}" \
            --github-output "$GITHUB_OUTPUT"

  fetch-content-batch:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_work == 'true'
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.batches_matrix) }}
      fail-fast: false
    env:
      GP_CODE_GITHUB_OWNER: hiyishui
      GP_DATA_GITHUB_OWNER: larkself
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      CODE_GITHUB_PAT: ${{ secrets.HIYISHUI_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      INPUT_YEAR: ${{ github.event.inputs.year }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Sync year raw repo
        run: |
          python -m my_stock announce sync-year-repos \
            --start "${INPUT_YEAR}-01-01" \
            --end "${INPUT_YEAR}-12-31"

      - name: Fetch content for batch
        env:
          BATCH_NAME: ${{ matrix.batch }}
          BATCH_DIR: ${{ needs.prepare.outputs.batch_dir }}
        run: |
          ARTIFACT_ROOT="${RUNNER_TEMP}/announce-content-artifact"
          mkdir -p "${ARTIFACT_ROOT}"
          python -m my_stock announce fetch-content-worker \
            --codes-file "${BATCH_DIR}/${BATCH_NAME}" \
            --runner-idx 0 \
            --output-dir "${ARTIFACT_ROOT}" \
            --summary-output "${RUNNER_TEMP}/content-summary.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: announce-l0-content-${{ matrix.batch }}
          path: ${{ runner.temp }}/announce-content-artifact
          if-no-files-found: warn
          retention-days: 7

  collect-round:
    runs-on: ubuntu-latest
    needs: [prepare, fetch-content-batch]
    if: needs.prepare.outputs.has_work == 'true'
    env:
      DATA_GITHUB_PAT: ${{ secrets.LARKSELF_PAT }}
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: announce-l0-content-*
          path: ${{ runner.temp }}/announce-artifacts
          merge-multiple: true

      - name: Collect this round to action-private
        run: |
          mkdir -p "${RUNNER_TEMP}/announce-artifacts"
          python -m my_stock announce collect-round \
            --artifact-dir "${RUNNER_TEMP}/announce-artifacts" \
            --stage "l0-content" \
            --push-to-action-private

  next-round:
    runs-on: ubuntu-latest
    needs: [prepare, fetch-content-batch, collect-round]
    if: |
      always() &&
      needs.prepare.outputs.has_next_round == 'true' &&
      (needs.collect-round.result == 'success' || needs.collect-round.result == 'skipped')
    env:
      MY_STOCK_PROJECT_ROOT: ${{ github.workspace }}/my-stock-src
      ACTION_DISPATCH_TOKEN_MAP: ${{ secrets.ACTION_DISPATCH_TOKEN_MAP }}
    steps:
      - name: Check out workflow replica repo
        uses: actions/checkout@v4

      - name: Check out my-stock source repo
        uses: actions/checkout@v4
        with:
          repository: hiyishui/my-stock
          ref: main
          path: my-stock-src
          token: ${{ secrets.HIYISHUI_PAT }}

      - name: Resolve runtime roots
        run: |
          echo "GP_DATA_ROOT=${RUNNER_TEMP}/gp-data" >> "$GITHUB_ENV"
          echo "GP_REPOS_ROOT=${RUNNER_TEMP}/gp-data/repos" >> "$GITHUB_ENV"
          echo "GP_RUNTIME_ROOT=${RUNNER_TEMP}/gp-data/runtime" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do python -m pip install './my-stock-src[provider]' && break || sleep 5; done

      - name: Dispatch next round
        run: |
          python -m my_stock announce trigger-next-round \
            --date-source "${{ github.event.inputs.year }}" \
            --max-parallel "${{ needs.prepare.outputs.max_parallel }}" \
            --current-round "${{ needs.prepare.outputs.current_round }}" \
            --total-rounds "${{ needs.prepare.outputs.total_rounds }}" \
            --workflow-file "announce-fetch-content-backfill.yml" \
            --extra-inputs '{"year":"${{ github.event.inputs.year }}"}'
